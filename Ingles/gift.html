<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ensayo PAES Matemática M1 | Preparación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<!-- KaTeX CSS y JS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root{
  --deep-green: #0a2f1f;
  --pine: #145c33;
  --mint: #2a7f49;
  --lime: #9bcd6c;
  --gold-soft: #d4b87a;
  --green-light: #e8f5e9;
  --green-bg: #f1f8f0;
  --white: #ffffff;
  --dark-text: #1a2e22;
  --gray: #5a6e5e;
  --border: #c8e0cf;
  --accent: #3c9e5c;
  --red: #c0392b;
  --orange: #e67e22;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Source Sans 3',sans-serif;
  background: linear-gradient(135deg, var(--deep-green) 0%, var(--pine) 50%, var(--mint) 100%);
  min-height:100vh;
}

/* ── HEADER ── */
.header{
  background:var(--deep-green);
  border-bottom:3px solid var(--lime);
  padding:16px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:12px;
}
.header h1{
  font-family:'Playfair Display',serif;
  color:var(--white);
  font-size:1.3rem;
  display:flex;
  align-items:center;
  gap:10px;
}
.header h1 span{color:var(--lime);}
.timer{
  background:rgba(0,0,0,0.3);
  padding:8px 20px;
  border-radius:40px;
  font-family:'JetBrains Mono',monospace;
  font-size:1.2rem;
  font-weight:700;
  color:var(--lime);
}
.timer.timer-naranja{color:var(--orange);}
.timer.timer-rojo{color:var(--red);}
.timer.timer-urgente{animation:pulse 1s infinite;}

@keyframes pulse{
  0%,100%{opacity:1;}
  50%{opacity:0.6;}
}

/* ── PROGRESS BAR ── */
.progress-container{
  background:rgba(0,0,0,0.3);
  height:6px;
}
.progress-bar{
  height:100%;
  background:var(--lime);
  width:0%;
  transition:width .3s;
}

/* ── MAIN CONTAINER ── */
.main-container{
  max-width:900px;
  margin:0 auto;
  padding:28px 20px 100px;
}

/* ── QUESTION CARD ── */
.question-card{
  background:var(--white);
  border-radius:24px;
  padding:28px 32px;
  box-shadow:0 12px 30px rgba(0,0,0,0.2);
  margin-bottom:24px;
}
.question-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  padding-bottom:12px;
  border-bottom:2px solid var(--border);
}
.question-number{
  font-family:'JetBrains Mono',monospace;
  font-size:.75rem;
  color:var(--gray);
  letter-spacing:.1em;
}
.question-status{
  font-size:.7rem;
  padding:4px 10px;
  border-radius:20px;
  background:var(--green-light);
  color:var(--pine);
}
.question-text{
  font-size:1rem;
  line-height:1.6;
  color:var(--dark-text);
  margin-bottom:24px;
}
.question-text .math-expr{font-family:'JetBrains Mono',monospace;background:var(--green-light);padding:2px 6px;border-radius:6px;}
.question-text .fraction{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;}
.question-text .fraction .num{border-bottom:1px solid var(--dark-text);padding:0 4px;}
.question-text .fraction .den{padding:0 4px;}
.question-text .table{font-size:.85rem;margin:10px auto;}
.question-text img{max-width:100%;border-radius:12px;margin:10px 0;}

/* ── OPTIONS ── */
.options{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.option{
  background:var(--green-light);
  border:2px solid var(--border);
  border-radius:16px;
  padding:14px 20px;
  cursor:pointer;
  transition:all .2s;
  font-size:.95rem;
  color:var(--dark-text);
}
.option:hover:not(.locked){
  border-color:var(--accent);
  background:#d4efdf;
  transform:translateX(4px);
}
.option.selected{
  border-color:var(--accent);
  background:#c8e6d5;
}
.option.locked{cursor:default;opacity:0.9;}
.option.correct{
  border-color:var(--accent);
  background:var(--green-light);
}
.option.wrong{
  border-color:var(--red);
  background:#fdeaea;
}
.option img{max-width:200px;border-radius:8px;vertical-align:middle;}

/* ── NAV BUTTONS ── */
.nav-buttons{
  display:flex;
  justify-content:space-between;
  gap:16px;
  margin-top:16px;
}
.nav-btn{
  background:var(--pine);
  color:var(--white);
  border:none;
  border-radius:40px;
  padding:12px 28px;
  font-family:'Source Sans 3',sans-serif;
  font-weight:700;
  font-size:.9rem;
  cursor:pointer;
  transition:all .2s;
}
.nav-btn:hover:not(:disabled){
  background:var(--mint);
  transform:scale(1.02);
}
.nav-btn:disabled{
  background:var(--gray);
  cursor:not-allowed;
  opacity:0.5;
}
.nav-btn.next{background:var(--accent);}
.nav-btn.next:hover:not(:disabled){background:#2d7a45;}

/* ─── RESULTS ─── */
.results-container{
  background:var(--white);
  border-radius:24px;
  padding:32px;
  margin-bottom:24px;
}
.score-display{
  text-align:center;
  padding:24px;
  background:linear-gradient(135deg, var(--green-light), var(--white));
  border-radius:20px;
  margin-bottom:24px;
}
.score-number{
  font-family:'Playfair Display',serif;
  font-size:3.5rem;
  font-weight:900;
  color:var(--pine);
}
.score-description{
  color:var(--gray);
  font-size:.9rem;
  margin-top:8px;
}
.excluded-questions{
  background:var(--green-light);
  padding:16px 20px;
  border-radius:16px;
  margin-bottom:24px;
  border-left:4px solid var(--gold-soft);
}
.results-list{
  display:flex;
  flex-direction:column;
  gap:16px;
}
.result-item{
  background:var(--green-light);
  border-radius:16px;
  padding:16px 20px;
}
.result-item.correct{border-left:4px solid var(--accent);}
.result-item.incorrect{border-left:4px solid var(--red);}
.result-item.excluded{border-left:4px solid var(--gold-soft);opacity:0.8;}
.result-item .q-title{
  font-weight:700;
  color:var(--deep-green);
  margin-bottom:8px;
}
.result-item .answer{
  font-size:.85rem;
  color:var(--gray);
  margin-top:6px;
}
.restart-btn{
  background:var(--accent);
  color:var(--white);
  border:none;
  border-radius:40px;
  padding:14px 32px;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
  transition:all .2s;
  display:block;
  margin:20px auto 0;
}
.restart-btn:hover{
  background:#2d7a45;
  transform:scale(1.02);
}

/* ── UTILS ── */
.hidden{display:none;}
.text-center{text-align:center;}

@media(max-width:600px){
  .header{padding:12px 16px;}
  .header h1{font-size:1rem;}
  .timer{font-size:.9rem;padding:4px 12px;}
  .question-card{padding:20px;}
  .option{padding:10px 16px;}
  .nav-btn{padding:8px 20px;}
}
</style>
</head>
<body>

<div class="header">
  <h1>📐 Ensayo PAES <span>Matemática M1</span></h1>
  <div class="timer" id="timer">02:20:00</div>
</div>
<div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>

<div class="main-container" id="mainContainer">
  <div id="quizContent"></div>
  <div class="nav-buttons" id="navButtons">
    <button class="nav-btn" id="prevBtn" onclick="previousQuestion()">← Anterior</button>
    <button class="nav-btn next" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
  </div>
</div>

<script>
// ============================================================
// POOL DE PREGUNTAS - 60 preguntas
// ============================================================
const questions = [
{
    pregunta: `Un bus tiene sus 30 asientos de capacidad ocupados, cada uno por una persona y además, lleva 10 personas de pie. Si en un paradero se baja el 20% de las personas que van sentadas y el 30% de las personas que van de pie y suben, en ese paradero, 2 personas, ¿cuántas personas quedarían de pie si se ocupan todos los asientos con una persona?`,
    opciones: [
        "3",
        "1",
        "7",
        "9"
    ],
    correcta: 0
    },
    {
        pregunta: `Se define la operación a # b = <span class="math-expr"><span class="fraction"><span class="num">a<sup>2</sup> + b<sup>2</sup></span><span class="den">a + b</span></span></span> para a ≠ -b. ¿Cuál es el valor de (5 # 3) + (4 # 2)?`,
        opciones: ["5", "6", "7", "8"],
        correcta: 2
    },
    {
        pregunta: `Un comerciante compra un producto a x pesos. Lo vende con una ganancia del 30% sobre el precio de compra. Luego, sobre ese precio de venta, ofrece un descuento del 20%. Si finalmente recibe 104.000 pesos, ¿cuál es el valor de x?`,
        opciones: ["80.000", "90.000", "100.000", "110.000"],
        correcta: 2
    },
    {
    pregunta: "\\((0,1 : 0,01) + 0,001 =\\)",
    opciones: [
        "0,101",
        "9,09",
        "0,002",
        "10,001"
    ],
    correcta: 3
    },
    {
    pregunta: "Si \\(M = 1,4 + 4,05\\); \\(P = 5,\\overline{6} - 0,2\\overline{1}\\) y \\(Q = 3,\\overline{21} + 2,\\overline{24}\\), ¿cuál de las siguientes relaciones es verdadera?",
    opciones: [
        "\\(P > Q > M\\)",
        "\\(M = Q > P\\)",
        "\\(Q > P > M\\)",
        "\\(P > M > Q\\)",
    ],
    correcta: 0
    },
    {
    pregunta: `Un técnico cobró, en total, 48.000 pesos por la reparación de un computador. Si en repuestos gastó 24.000 pesos y cobra 7.500 pesos por hora de trabajo, ¿cuánto tiempo demoró en realizar la reparación de ese computador?`,
    opciones: [
        "6 horas y 40 minutos",
        "3 horas y 12 minutos",
        "6 horas y 24 minutos",
        "3 horas y 20 minutos",
    ],
    correcta: 1
    },
    {
        pregunta: `¿Cuál es el 15% del 40% de 500?`,
        opciones: ["20", "30", "40", "50"],
        correcta: 1
    },
    {
    pregunta: "Si el a% del 5% de b es c y el b% del 10% de c es a, entonces la relación entre a y c es",
    opciones: [
        "\\(a^2 = 2c^2\\)",
        "\\(a^2 = 2c\\)",
        "\\(a = 2c\\)",
        "\\(a = c\\)"
    ],
    correcta: 0
    },
    {
        pregunta: `Un número de tres dígitos es tal que la suma de sus dígitos es 18, el dígito de las centenas es el doble del dígito de las unidades, y el número es 198 unidades mayor que el número formado al invertir sus dígitos. ¿Cuál es el producto de los dígitos?`,
        opciones: ["120", "140", "160", "180"],
        correcta: 2
    },
    {
    pregunta: "Si \\(P = 3 + \\sqrt{5}\\), \\(Q = \\sqrt{14}\\) y \\(R = \\sqrt{30} - 4\\), entonces",
    opciones: [
        "\\(R < Q < P\\)",
        "\\(P < Q < R\\)",
        "\\(P < R < Q\\)",
        "\\(R < P < Q\\)",
    ],
    correcta: 0
    },
    {
        pregunta: `Una persona gasta <span class="math-expr"><span class="fraction"><span class="num">3</span><span class="den">8</span></span></span> de su dinero en arriendo, luego <span class="math-expr"><span class="fraction"><span class="num">2</span><span class="den">5</span></span></span> del resto en alimentación, luego <span class="math-expr"><span class="fraction"><span class="num">1</span><span class="den">3</span></span></span> del nuevo resto en transporte y finalmente le quedan $42.000. ¿Cuánto dinero tenía inicialmente?`,
        opciones: ["112.000", "126.000", "140.000", "168.000"],
        correcta: 3
    },
    {
    pregunta: "Si el precio de un helado es $500, ¿cuál de las siguientes expresiones representa el valor del helado aumentado en su 120%?",
    opciones: [
        "\\(500 + 120 \\cdot 500\\)",
        "\\(500 + 20 \\cdot 500\\)",
        "\\(1,20 \\cdot 500\\)",
        "\\(2,20 \\cdot 500\\)"
    ],
    correcta: 3
    },
    {
    pregunta: `Los cuadrados congruentes de las cuadrículas de 5 por 5 que aparecen en las opciones sirven para contar el puntaje que se ha obtenido en cierto juego con cartas.<br><br>
    Una persona inicialmente tiene 8 puntos de un total de 25. Luego de una buena jugada, el juego la bonifica con un aumento del 25% respecto de los puntos que tiene en ese momento.<br><br>
    ¿Cuál de las siguientes opciones presenta de forma correcta el cambio entre la situación inicial de 8 puntos y el puntaje final luego de la bonificación?`,
    opciones: [
        "<img src='https://i.ibb.co/YThBbX3g/image.png' alt='Cuadrícula 5x5 opción A' style='width: 200px; height: auto;'>",
        "<img src='https://i.ibb.co/9m7kQJK8/image.png' alt='Cuadrícula 5x5 opción B' style='width: 200px; height: auto;'>",
        "<img src='https://i.ibb.co/3m6fL32R/image.png' alt='Cuadrícula 5x5 opción C' style='width: 200px; height: auto;'>",
        "<img src='https://i.ibb.co/Kzc2fv8h/image.png' alt='Cuadrícula 5x5 opción D' style='width: 200px; height: auto;'>"
    ],
    correcta: 2
    },
    {
    pregunta: `En una tienda se muestra una tabla incompleta como la adjunta. ¿Cuáles son los valores, en pesos, de M y N, respectivamente?<br><br>
    <table class='table' style='border-collapse: collapse; width: 80%; margin: 10px auto; text-align: center;'>
        <thead>
            <tr style='background-color: #f2f2f2;'>
                <th style='border: 1px solid #999; padding: 8px;'>Artículo</th>
                <th style='border: 1px solid #999; padding: 8px;'>Precio Original ($)</th>
                <th style='border: 1px solid #999; padding: 8px;'>Descuento 20% ($)</th>
                <th style='border: 1px solid #999; padding: 8px;'>Precio Final ($)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style='border: 1px solid #999; padding: 8px;'>Camiseta</td>
                <td style='border: 1px solid #999; padding: 8px;'>2.000</td>
                <td style='border: 1px solid #999; padding: 8px;'>400</td>
                <td style='border: 1px solid #999; padding: 8px;'>1.600</td>
            </tr>
            <tr>
                <td style='border: 1px solid #999; padding: 8px;'>Pantalón</td>
                <td style='border: 1px solid #999; padding: 8px;'>8.000</td>
                <td style='border: 1px solid #999; padding: 8px;'></td>
                <td style='border: 1px solid #999; padding: 8px;'>M</td>
            </tr>
            <tr>
                <td style='border: 1px solid #999; padding: 8px;'>Chaqueta</td>
                <td style='border: 1px solid #999; padding: 8px;'>N</td>
                <td style='border: 1px solid #999; padding: 8px;'></td>
                <td style='border: 1px solid #999; padding: 8px;'>7.200</td>
            </tr>
        </tbody>
    </table>
    ¿Cuáles son los valores, en pesos, de M y N, respectivamente?`,
    opciones: [
        "6.400 y 9.000",
        "6.400 y 8.800",
        "7.600 y 9.000",
        "7.600 y 7.600",
    ],
    correcta: 0
    },
    {
    pregunta: `Un profesor ve algunos resultados de una encuesta por internet realizada a 100 personas un determinado día, de las cuales el 25% omitió la última pregunta. Una semana después se realiza la misma encuesta a otras 100 personas, de las cuales un 35% omitió la última pregunta.<br><br>
    El profesor le pide a cuatro de sus estudiantes que realicen conclusiones de estos datos.<br><br>
    • Sebastián señala: del total de personas encuestadas un 60% omitió la última pregunta.<br>
    • Angélica señala: en la segunda encuesta la omisión total tuvo un aumento de 10 puntos porcentuales con respecto a la omisión total de la primera encuesta.<br>
    • Luisa señala: del total de personas encuestadas 60 personas omitieron la última pregunta.<br>
    • Manuel señala: en la segunda encuesta la pregunta más omitida fue la última.<br><br>
    ¿Cuál de ellos está en lo correcto?`,
    opciones: [
        "Sebastián",
        "Angélica",
        "Luisa",
        "Manuel"
    ],
    correcta: 2
},
    {
    pregunta: `La edad actual (x) de Pedro es al menos el doble de la edad que tenía hace 10 años y es menor que la mitad de la edad que tendrá en 15 años más. ¿Cuál de los siguientes sistemas de inecuaciones es la traducción del enunciado?`,
    opciones: [
        "\\(x \\geq 2(x - 10)\\), \\(x < \\frac{1}{2}(x + 15)\\)",
        "\\(x < 2(x - 10)\\), \\(x < \\frac{1}{2}(x + 15)\\)",
        "\\(x < 2(x + 10)\\), \\(x \\leq \\frac{1}{2}(x - 15)\\)",
        "\\(x \\geq 2(x + 10)\\), \\(x < \\frac{1}{2}(x - 15)\\)",
    ],
    correcta: 0
    },
    {
    pregunta: `En la tabla adjunta se presentan las equivalencias de las medidas de almacenamiento de información de una computadora, cuya unidad básica es el bit.<br><br>
    <table class='table' style='border-collapse: collapse; width: 80%; margin: 10px auto; text-align: center;'>
        <thead>
            <tr style='background-color: #f2f2f2;'>
                <th style='border: 1px solid #999; padding: 8px;'>Medida</th>
                <th style='border: 1px solid #999; padding: 8px;'>Simbología</th>
                <th style='border: 1px solid #999; padding: 8px;'>Equivalencia</th>
            </tr>
        </thead>
        <tbody>
            <tr><td style='border: 1px solid #999; padding: 8px;'>Byte</td><td style='border: 1px solid #999; padding: 8px;'>B</td><td style='border: 1px solid #999; padding: 8px;'>8 bits</td></tr>
            <tr><td style='border: 1px solid #999; padding: 8px;'>Kilobyte</td><td style='border: 1px solid #999; padding: 8px;'>KB</td><td style='border: 1px solid #999; padding: 8px;'>1024 B</td></tr>
            <tr><td style='border: 1px solid #999; padding: 8px;'>Megabyte</td><td style='border: 1px solid #999; padding: 8px;'>MB</td><td style='border: 1px solid #999; padding: 8px;'>1024 KB</td></tr>
            <tr><td style='border: 1px solid #999; padding: 8px;'>Gigabyte</td><td style='border: 1px solid #999; padding: 8px;'>GB</td><td style='border: 1px solid #999; padding: 8px;'>1024 MB</td></tr>
            <tr><td style='border: 1px solid #999; padding: 8px;'>Terabyte</td><td style='border: 1px solid #999; padding: 8px;'>TB</td><td style='border: 1px solid #999; padding: 8px;'>1024 GB</td></tr>
            <tr><td style='border: 1px solid #999; padding: 8px;'>Petabyte</td><td style='border: 1px solid #999; padding: 8px;'>PB</td><td style='border: 1px solid #999; padding: 8px;'>1024 TB</td></tr>
            <tr><td style='border: 1px solid #999; padding: 8px;'>Exabyte</td><td style='border: 1px solid #999; padding: 8px;'>EB</td><td style='border: 1px solid #999; padding: 8px;'>1024 PB</td></tr>
            <tr><td style='border: 1px solid #999; padding: 8px;'>Zettabyte</td><td style='border: 1px solid #999; padding: 8px;'>ZB</td><td style='border: 1px solid #999; padding: 8px;'>1024 EB</td></tr>
            <tr><td style='border: 1px solid #999; padding: 8px;'>Yottabyte</td><td style='border: 1px solid #999; padding: 8px;'>YB</td><td style='border: 1px solid #999; padding: 8px;'>1024 ZB</td></tr>
        </tbody>
    </table>
    ¿Cuántos Gigabytes equivalen a un Zettabyte?`,
    opciones: [
        "\\(2^{10}\\)",
        "\\(2^{12}\\)",
        "\\(2^{40}\\)",
        "\\(2^{50}\\)"
    ],
    correcta: 2
    },
    {
    pregunta: `¿En cuál de las siguientes tablas, las variables P y Q son directamente proporcionales?`,
    opciones: [

const paesScores = [100, 170, 194, 216, 236, 256, 275, 292, 307, 320, 334, 349, 365, 380, 393, 403, 412, 421, 432, 446, 460, 474, 486, 495, 502, 508, 516, 526, 539, 553, 567, 579, 587, 595, 601, 609, 618, 631, 645, 660, 672, 682, 690, 699, 710, 723, 738, 753, 767, 780, 793, 807, 824, 842, 861, 880, 900, 923, 948, 975, 1000];

// ============================================================
// CONFIGURACIÓN
// ============================================================
let currentQuestion = 0;
let userAnswers = {};
let excludedQuestions = [];
let startTime;
let timerInterval;
let totalSeconds = 0;
let submitted = false;
let shuffledOptions = [];

const MAX_TIME_SECONDS = 140 * 60;

// ============================================================
// UTILIDADES
// ============================================================
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function selectRandomExcludedQuestions() {
  const indices = Array.from({ length: questions.length }, (_, i) => i);
  const shuffled = shuffleArray(indices);
  excludedQuestions = shuffled.slice(0, 5).sort((a, b) => a - b);
}

function shuffleOptionsForQuestion(q) {
  const indices = [0, 1, 2, 3];
  const shuffledIndices = shuffleArray(indices);
  const newOpts = shuffledIndices.map(i => q.opciones[i]);
  const newAns = shuffledIndices.indexOf(q.correcta);
    return { 
        opts: [...q.opciones], 
        ansIdx: q.correcta 
    };
}

function buildTest() {
  shuffledOptions = questions.map(q => shuffleOptionsForQuestion(q));
  userAnswers = {};
  currentQuestion = 0;
  submitted = false;
}

// ============================================================
// TIMER
// ============================================================
function startTimer() {
  startTime = new Date();
  totalSeconds = 0;
  timerInterval = setInterval(updateTimer, 1000);
}

function updateTimer() {
  if (submitted) return;
  totalSeconds = Math.floor((new Date() - startTime) / 1000);
  const tiempoRestante = MAX_TIME_SECONDS - totalSeconds;
  const timerEl = document.getElementById('timer');

  if (tiempoRestante <= 0) {
    clearInterval(timerInterval);
    timerEl.textContent = '00:00';
    timerEl.className = 'timer timer-rojo timer-urgente';
    showResults();
    return;
  }

  const hours = Math.floor(tiempoRestante / 3600);
  const minutes = Math.floor((tiempoRestante % 3600) / 60);
  const seconds = tiempoRestante % 60;
  
  if (hours > 0) {
    timerEl.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  } else {
    timerEl.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  }

  if (tiempoRestante <= 300) {
    timerEl.className = 'timer timer-rojo timer-urgente';
  } else if (tiempoRestante <= 900) {
    timerEl.className = 'timer timer-naranja';
  } else {
    timerEl.className = 'timer';
  }
}

function formatTime(seconds) {
  const hours = Math.floor(seconds / 3600);
  const minutes = Math.floor((seconds % 3600) / 60);
  const secs = seconds % 60;
  if (hours > 0) return `${hours}h ${minutes}m ${secs}s`;
  if (minutes > 0) return `${minutes}m ${secs}s`;
  return `${secs}s`;
}

// ============================================================
// RENDERIZADO
// ============================================================
function renderQuestion() {
  const q = questions[currentQuestion];
  const optData = shuffledOptions[currentQuestion];
  const progress = ((currentQuestion + 1) / questions.length) * 100;
  document.getElementById('progressBar').style.width = `${progress}%`;

  let optionsHtml = '';
  const letters = ['A', 'B', 'C', 'D'];
  optData.opts.forEach((opt, idx) => {
    const isSelected = userAnswers[currentQuestion] === idx;
    optionsHtml += `
      <div class="option ${isSelected ? 'selected' : ''}" onclick="selectOption(${idx})">
        <strong>${letters[idx]}.</strong> ${opt}
      </div>
    `;
  });

  document.getElementById('quizContent').innerHTML = `
    <div class="question-card">
      <div class="question-header">
        <div class="question-number">PREGUNTA ${currentQuestion + 1} de ${questions.length}</div>
        <div class="question-status">${userAnswers[currentQuestion] !== undefined ? '✓ Respondida' : '⚪ Sin responder'}</div>
      </div>
      <div class="question-text">${q.pregunta}</div>
      <div class="options">${optionsHtml}</div>
    </div>
  `;
  
  updateNavigationButtons();
  setTimeout(() => {
    if (window.renderMathInElement) {
      renderMathInElement(document.getElementById('quizContent'), {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '\\[', right: '\\]', display: true},
          {left: '\\(', right: '\\)', display: false},
          {left: '$', right: '$', display: false}
        ],
        throwOnError: false
      });
    }
  }, 50);
}

function selectOption(index) {
  if (submitted) return;
  userAnswers[currentQuestion] = index;
  renderQuestion();
}

function updateNavigationButtons() {
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  prevBtn.disabled = currentQuestion === 0;
  nextBtn.textContent = currentQuestion === questions.length - 1 ? 'Ver Resultados' : 'Siguiente →';
}

function previousQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
  }
}

function nextQuestion() {
  if (currentQuestion === questions.length - 1) {
    showResults();
  } else {
    currentQuestion++;
    renderQuestion();
  }
}

// ============================================================
// RESULTADOS
// ============================================================
function showResults() {
  if (submitted) return;
  submitted = true;
  clearInterval(timerInterval);
  
  let correct = 0;
  let resultsHtml = '';

  questions.forEach((question, index) => {
    const isExcluded = excludedQuestions.includes(index);
    if (!isExcluded) {
      if (userAnswers[index] === shuffledOptions[index].ansIdx) correct++;
    }
  });

  const paesScore = paesScores[correct] || paesScores[paesScores.length - 1];

  // Preguntas excluidas
  let excludedHtml = `
    <div class="excluded-questions">
      <strong>⚠️ Preguntas NO consideradas para el puntaje:</strong><br>
      Las siguientes 5 preguntas fueron seleccionadas aleatoriamente y no afectan tu puntaje:
      <ul style="margin-top:8px; margin-left:20px;">
  `;
  excludedQuestions.forEach(i => {
    excludedHtml += `<li>Pregunta ${i + 1}</li>`;
  });
  excludedHtml += `</ul></div>`;

  // Detalle de todas las preguntas
  questions.forEach((question, index) => {
    const userAnswer = userAnswers[index];
    const isExcluded = excludedQuestions.includes(index);
    const optData = shuffledOptions[index];
    const isCorrect = userAnswer === optData.ansIdx;
    const letters = ['A', 'B', 'C', 'D'];
    
    let userAnswerText = '';
    if (userAnswer === undefined) {
      userAnswerText = '<em>Sin respuesta</em>';
    } else {
      userAnswerText = `${letters[userAnswer]}) ${optData.opts[userAnswer]}`;
    }
    
    const correctAnswerText = `${letters[optData.ansIdx]}) ${optData.opts[optData.ansIdx]}`;

    if (isExcluded) {
      resultsHtml += `
        <div class="result-item excluded">
          <div class="q-title">Pregunta ${index + 1} (NO CONSIDERADA)</div>
          <div>${question.pregunta.replace(/<[^>]*>/g, '').substring(0, 120)}${question.pregunta.replace(/<[^>]*>/g, '').length > 120 ? '...' : ''}</div>          <div class="answer">Tu respuesta: ${userAnswerText}</div>
          <div class="answer">Respuesta correcta: ${correctAnswerText}</div>
          <div class="answer"><em>⚠️ Esta pregunta no se consideró para el cálculo del puntaje</em></div>
        </div>
      `;
    } else {
      resultsHtml += `
        <div class="result-item ${isCorrect ? 'correct' : 'incorrect'}">
          <div class="q-title">Pregunta ${index + 1}</div>
          <div>${question.pregunta.replace(/<[^>]*>/g, '').substring(0, 120)}${question.pregunta.replace(/<[^>]*>/g, '').length > 120 ? '...' : ''}</div>          <div class="answer">Tu respuesta: ${userAnswerText}</div>
          ${!isCorrect ? `<div class="answer">Respuesta correcta: ${correctAnswerText}</div>` : ''}
        </div>
      `;
    }
  });

  document.getElementById('quizContent').innerHTML = `
    <div class="results-container">
      <div class="score-display">
        <h3>📊 Tu Puntaje PAES</h3>
        <div class="score-number">${paesScore} puntos</div>
        <div class="score-description">✅ Correctas: ${correct} de ${questions.length - 5} preguntas consideradas</div>
        <div class="score-description">⏱️ Tiempo total: ${formatTime(totalSeconds)}</div>
      </div>
      ${excludedHtml}
      <div class="results-list">${resultsHtml}</div>
      <button class="restart-btn" onclick="restartExam()">🔄 Reiniciar Ensayo</button>
    </div>
  `;
  
  document.getElementById('navButtons').style.display = 'none';
  document.getElementById('progressBar').style.width = '100%';
  
  setTimeout(() => {
    if (window.renderMathInElement) {
      renderMathInElement(document.getElementById('quizContent'), {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '\\[', right: '\\]', display: true},
          {left: '\\(', right: '\\)', display: false},
          {left: '$', right: '$', display: false}
        ],
        throwOnError: false
      });
    }
  }, 50);
}

function restartExam() {
  clearInterval(timerInterval);
  selectRandomExcludedQuestions();
  buildTest();
  currentQuestion = 0;
  submitted = false;
  startTimer();
  renderQuestion();
  document.getElementById('navButtons').style.display = 'flex';
  document.getElementById('progressBar').style.width = '0%';
}

// ============================================================
// INICIALIZACIÓN
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  selectRandomExcludedQuestions();
  buildTest();
  startTimer();
  renderQuestion();
  setTimeout(() => {
    if (window.renderMathInElement) {
      renderMathInElement(document.getElementById('quizContent'), {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '\\[', right: '\\]', display: true},
          {left: '\\(', right: '\\)', display: false},
          {left: '$', right: '$', display: false}
        ],
        throwOnError: false
      });
    }
  }, 100);
});
</script>
